<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="dashboard-wrapper">
        <header class="top-bar panel">
            <div style="display:flex; align-items:center; gap:16px;">
                <div class="logo-text" style="font-weight:bold; font-size:1.2rem;">console</div>
                <button id="time-toggle-btn" class="time-toggle">24H</button>
                <button id="theme-btn" style="background:transparent; color:var(--text-dim); border:none; cursor:pointer; font-size:1.2rem; outline:none; transition:0.2s">◐</button>
            </div>
            <div class="clock-area" style="display:flex; flex-direction:column; align-items:flex-end;">
                <h1 id="clock-text" style="font-size:3.5rem; font-weight:800; letter-spacing:-2px; line-height:1; margin:0;">00:00</h1>
                <div id="date-text" style="color:var(--text-dim); font-size:1rem; font-weight:500; margin-top:8px;">loading...</div>
            </div>
        </header>
        <div class="main-grid">
            <div style="display:flex; flex-direction: :column; gap:1.4rem;">
                <section class="panel">
                    <h3 style="color:var(--text-dim); margin-bottom: 1rem;">Focus</h3>
                    <input type="text" id="new-task" placeholder="What needs doing?">
                    <ul id="task-list"></ul>    
                </section>
                <section class="panel" style="display:flex; flex-direction:column; align-items:center; padding:2rem 1.5rem;">
                    <h3 style="color:var(--text-dim); margin-bottom: :0.5rem; width:100%; text-align:left;">Flow State</h3>
                    <h1 id="flow-time" style="font-size:3.5rem; font-weight:800; letter-spacing:-2px; margin:1.5rem 0;">25:00</h1>
                    <div style="display:flex; gap:12px; margin-bottom:1.5rem;">
                        <button id="flow-play" class="time-toggle" style="font-size:0.85rem; padding: 6px 18px;">Start</button>
                        <button id="flow-reset" class="time-toggle" style="font-size:0.85rem; padding: 6px 18px;">Reset</button>
                    </div>
                    <div style="width:100%; border-top: var(--border-line); padding-top:1rem; display:flex; align-items:center;justify-content: space-between;">
                        
                    </div>
                </section>
            </div>
            <section class="panel">
                <h3 style="color: var(--text-dim); margin-bottom:1rem;">Scratchpad</h3>
                <textarea id="notes-area" placeholder="Type here..."></textarea>
            </section>
            <div style="display:flex; flex-direction:column; gap:1.4rem;">
                <section class = "panel" style="display:flex; flex-direction:column; align-items:center;">
                    <h3 style= "color: var(--text-dim); margin-bottom:1rem;">Analog</h3>
                    <div class="clock-face">
                        <div class="hand hour-hand" id="hour-hand"></div>
                        <div class="hand min-hand" id="min-hand"></div>
                        <div class="hand sec-hand" id="sec-hand"></div>
                        <div class="center-dot"></div>
                    </div>
                </section>
                <section class="panel" style="display:flex; flex-direction:column; justify-content:center;">
                    <h3 style="color:var(--text-dim); margin-bottom:0.5rem;">Weather</h3>
                    <div style="display:flex; align-items:baseline; gap:8px">
                        <h1 id="w-temp" style="font-size:2.5rem; font-weight:700; letter-spacing:-1px;">>--°C</h1>
                        <span id="w-desc" style="color:var(--text-dim); font-weight:500;">Loading...</span>

                    </div>
                    <div id="w-loc" style="color:var(--text-dim); font-size:0.85rem; margin-top:4px">Locating...</div>
                </section>
            </div>
        </div>
          
        </header>
        <script src="app.js"></script>
    </main>
</body>
</html>
