<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="dashboard-wrapper">
        <header class="top-bar panel">
            <div class="logo-text">console</div>
            <div class="clock-area">
                <span id="date-text">loading...</span>
             <div style="display:flex; align-items:baseline;gap:10px;justify-content:flex-end;>
                <h1 id="clock-text">00:00</h1>
                <button id="time-toggle-btn" style="background:none; border:1px solid var(--text-dim); color:var(--text-dim); cursor:pointer; padding: 2px 6px; border-radius:4px;">24H</button>
             </div>
            </div>
            </header>
        <div class="main-grid">
            <section class="panel">
                <h3 style="color: var(--text-dim); margin-bottom:1rem;">Focus</h3>
                <input type="text" id="new-task" placeholder="What needs doing?">
                <ul id="task-list"></ul>
            </section>
            <section class="panel">
                <h3 style="color: var(--text-dim); margin-bottom:1rem;">Scratchpad</h3>
                <textarea id="notes-area" placeholder="Type here..."></textarea>
            </section>
            <div style="display:flex; flex-direction:column; gap:1.4rem;">
                <section class = "panel" style="display:flex; flex-direction:column; align-items:center;">
                    <h3 style= "color: var(--text-dim); margin-bottom:1rem;">Analog</h3>
                    <div class="clock-face">
                        <div class="hand hour-hand" id="hour-hand"></div>
                        <div class="hand min-hand" id="min-hand"></div>
                        <div class="hand sec-hand" id="sec-hand"></div>
                        <div class="center-dot"></div>
                    </div>
                </section>
            </div>
        </div>
        <div class="logo-text">
             <button id="theme-btn" style="background:none; color:white; border:none; cursor:pointer;">◐</button>
        </div>    
        </header>
        <script src="app.js"></script>
    </main>
</body>
</html>
