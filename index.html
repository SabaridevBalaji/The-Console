<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="dashboard-wrapper">
        <header class="top-bar panel">
            <div class="logo-text">console</div>
            <div class="clock-area">
                <span id="date-text">loading...</span>
                <h1 id="clock-text">00:00</h1>
            </div>
            <section class="panel">
                <h3 style="color: var(--text-dim); margin-bottom:1rem;">Focus</h3>
                <input type="text" id="new-task" placeholder="What needs doing?">
                <ul id="task-list"></ul>
            </section>
            <section class="panel">
                <h3 style="color: var(--text-dim); margin-bottom:1rem;">Scratchpad</h3>
                <textarea id="notes-area" placeholder="Type here..."></textarea>
            </section>
        </header>
        <script src="app.js"></script>
    </main>
</body>
</html>
